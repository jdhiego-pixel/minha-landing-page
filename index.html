<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Landing Page</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            padding: 100px 20px;
        }
        h1 {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.5rem;
            max-width: 600px;
            margin: 0 auto 40px;
        }
        .btn {
            display: inline-block;
            background: white;
            color: #667eea;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        footer {
            margin-top: 100px;
            font-size: 1rem;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <h1>Olá, Mundo!</h1>
    <p>Esta é uma landing page simples criada aqui no ambiente.<br>
    Foi hospedada automaticamente no Vercel!</p>
    
    <a href="#" class="btn">Botão de Ação</a>
    
    <footer>
        Feito com ❤️ usando Grok + Vercel
    </footer>
</body>
</html>
